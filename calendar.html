<!-- CALENDAR -->
<section class="calendar-app">

  <div class="calendar-header">
    <button onclick="changeMonth(-1)">&#10094;</button>
    <h2 id="monthYear"></h2>
    <button onclick="changeMonth(1)">&#10095;</button>
  </div>

  <div class="weekdays">
    <div>Sun</div><div>Mon</div><div>Tue</div>
    <div>Wed</div><div>Thu</div><div>Fri</div><div>Sat</div>
  </div>

  <div class="calendar" id="calendar"></div>

</section>

<!-- SIDE PANEL -->
<div id="eventPanel" class="side-panel">
  <span class="close-btn" onclick="closePanel()">&times;</span>
  <h2 id="eventDate"></h2>
  <p id="eventDetails"></p>
</div>

<!-- SCRIPT -->
<script>

let currentDate = new Date();

// SAMPLE EVENTS
const events = {
  "2026-06-15": "Opening of Classes",
  "2026-07-10": "First Quiz",
  "2026-08-21": "Holiday",
  "2026-10-12": "Midterm Exams",
  "2026-12-18": "Christmas Party",
  "2027-03-20": "Final Exams"
};

function renderCalendar() {
  const calendar = document.getElementById("calendar");
  calendar.innerHTML = "";

  const monthYear = document.getElementById("monthYear");

  const year = currentDate.getFullYear();
  const month = currentDate.getMonth();

  const firstDay = new Date(year, month, 1).getDay();
  const lastDate = new Date(year, month + 1, 0).getDate();

  monthYear.innerText = currentDate.toLocaleString("default", {
    month: "long",
    year: "numeric"
  });

  // empty slots
  for (let i = 0; i < firstDay; i++) {
    calendar.innerHTML += `<div></div>`;
  }

  // days
  for (let i = 1; i <= lastDate; i++) {
    let fullDate = `${year}-${String(month+1).padStart(2,'0')}-${String(i).padStart(2,'0')}`;

    let classes = "day";
    if (events[fullDate]) classes += " event";

    calendar.innerHTML += `
      <div class="${classes}" onclick="openEvent('${fullDate}')">
        ${i}
      </div>
    `;
  }
}

function changeMonth(step) {
  currentDate.setMonth(currentDate.getMonth() + step);
  renderCalendar();
}

function openEvent(date) {
  document.getElementById("eventPanel").classList.add("open");
  document.getElementById("eventDate").innerText = date;
  document.getElementById("eventDetails").innerText =
    events[date] || "No events for this day.";
}

function closePanel() {
  document.getElementById("eventPanel").classList.remove("open");
}

renderCalendar();

</script>
